version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: seapedia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seapedia
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: seapedia_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  postgres_data:
